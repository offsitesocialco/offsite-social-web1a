media:
  input: public
  output: /
content:
  - name: blog
    label: Social Club Updates
    type: collection
    path: src/content/blog
    fields:
      - name: title
        label: Title
        type: string
      - name: description
        label: Description
        type: text
      - name: pubDate
        label: Publish Date
        type: date
      - name: updatedDate
        label: Last Updated Date
        type: date
      - name: heroImage
        label: Hero Image
        type: image
      - name: body
        label: Body
        type: rich-text